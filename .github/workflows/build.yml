name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: \${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: codegen-studio-linux
            bundle: appimage,deb
          - os: windows-latest
            artifact_name: codegen-studio-windows
            bundle: msi,nsis
          - os: macos-latest
            artifact_name: codegen-studio-macos
            bundle: dmg,app
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: \${{ matrix.os == 'macos-latest' && 'x86_64-apple-darwin' || matrix.os == 'windows-latest' && 'x86_64-pc-windows-msi' || 'x86_64-unknown-linux-gnu' }}
    
    - name: Setup Java
      if: matrix.os == 'ubuntu-latest'
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install system dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.0-dev \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
          frontend/node_modules
          ~/.m2
        key: \${{ runner.os }}-build-\${{ hashFiles('**/Cargo.lock', '**/package-lock.json', '**/pom.xml') }}
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Build frontend
      run: |
        cd frontend
        npm run build
    
    - name: Build Java backend
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd java-backend
        mvn clean package -DskipTests
    
    - name: Build Tauri app
      run: |
        cd src-tauri
        cargo tauri build --bundles \${{ matrix.bundle }} --verbose
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: \${{ matrix.artifact_name }}
        path: |
          src-tauri/target/release/bundle/
          src-tauri/target/release/*.exe
          src-tauri/target/release/*.app
          src-tauri/target/release/*.dmg
    
    - name: Create release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          src-tauri/target/release/bundle/**/*.deb
          src-tauri/target/release/bundle/**/*.appimage
          src-tauri/target/release/bundle/**/*.msi
          src-tauri/target/release/bundle/**/*.dmg
        draft: true
        prerelease: false
